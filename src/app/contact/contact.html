<section id="contact" class="bg-white font-sans">
  <div class="max-w-7xl mx-auto px-6 py-20">
    <div class="grid lg:grid-cols-12 gap-16 items-start">
      
      <div class="lg:col-span-5">
        <span class="text-emerald-600 font-black uppercase tracking-[0.4em] text-[10px] mb-6 block bg-emerald-50 w-fit px-4 py-1.5 rounded-full">
          Get in touch
        </span>
        <h2 class="text-5xl md:text-6xl font-black text-gray-900 leading-[1.1] tracking-tighter mb-8">
          Let’s start a <br> <span class="text-emerald-600 font-light italic">conversation.</span>
        </h2>
        
        <p class="text-lg text-gray-500 mb-12 max-w-md leading-relaxed font-medium">
          Hamare elders ki care ke baare mein koi bhi sawal ho, toh be-jhijhak humein contact karein.
        </p>

        <div class="space-y-10">
          <div class="flex items-start gap-6 group">
            <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-xl group-hover:bg-emerald-600 group-hover:text-white transition-all duration-500 shadow-sm">📍</div>
            <div>
              <h4 class="text-[10px] font-black uppercase tracking-widest text-emerald-700 mb-1">Our Location</h4>
              <p class="text-xl font-bold text-gray-900 leading-tight">Umari P, Maharashtra</p>
              <p class="text-gray-500 font-medium text-sm">Sant Shree Dola Maharaj Old Age Home</p>
            </div>
          </div>

          <div class="flex items-start gap-6 group">
            <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-xl group-hover:bg-emerald-600 group-hover:text-white transition-all duration-500 shadow-sm">📞</div>
            <div>
              <h4 class="text-[10px] font-black uppercase tracking-widest text-emerald-700 mb-1">Direct Contact</h4>
              <p class="text-xl font-bold text-gray-900">+91 9326443447</p>
              <p class="text-emerald-600 font-bold text-sm">adil.aq48@gmail.com</p>
            </div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-7">
        <div class="bg-[#fcfdfc] p-8 md:p-14 rounded-[3.5rem] border border-gray-100 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.03)]">
          <h3 class="text-3xl font-black text-gray-900 tracking-tight mb-10">Send a Message</h3>

          <form (submit)="sendEmail($event)" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Full Name</label>
              <input type="text" name="from_name" required placeholder="John Doe" class="w-full bg-white border border-gray-100 px-6 py-4 rounded-2xl shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Email Address</label>
              <input type="email" name="from_email" required placeholder="mail@example.com" class="w-full bg-white border border-gray-100 px-6 py-4 rounded-2xl shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
            </div>
            <div class="md:col-span-2 space-y-2">
              <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Phone Number</label>
              <input type="tel" name="phone_number" required placeholder="+91 00000 00000" class="w-full bg-white border border-gray-100 px-6 py-4 rounded-2xl shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
            </div>
            <div class="md:col-span-2 space-y-2">
              <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Message</label>
              <textarea name="message" rows="4" required placeholder="How can we help you?" class="w-full bg-white border border-gray-100 px-6 py-4 rounded-2xl shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none resize-none transition-all"></textarea>
            </div>
            <button type="submit" class="md:col-span-2 w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-100">
              Send Message
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="w-full h-[450px] bg-gray-100 border-t border-gray-100">
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3737.587!2d77.871!3d20.134!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjDCsDA4JzAzLjgiTiA3N8KwNTInMjYuNyJF!5e0!3m2!1sen!2sin!4v1713300000000!5m2!1sen!2sin" 
      class="w-full h-full border-0 grayscale hover:grayscale-0 transition-all duration-1000" 
      allowfullscreen="" 
      loading="lazy">
    </iframe>
  </div>
</section>
